<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VacationPro Newsletter Header — White</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
    }
    .header {
      width: 1280px;
      background: #ffffff;
      padding: 56px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border-bottom: 4px solid #4ac850;
    }
    .lockup {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 14px;
    }
    .lockup img {
      width: 88px;
      height: 88px;
      display: block;
    }
    .wordmark {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #4ac850;
      line-height: 1;
    }
    .tagline {
      font-size: 22px;
      font-weight: 700;
      color: #4ac850;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="lockup">
      <img src="logo-airplane.svg" alt="VacationPro">
      <div class="wordmark">VacationPro</div>
    </div>
    <div class="tagline">All-Inclusive Vacation Packages, Curated Weekly</div>
  </div>
</body>
</html>
