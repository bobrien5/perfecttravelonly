# Nginx config for vacationpro.co
# Routes /blog/* to WordPress, everything else to Next.js
#
# Installation:
#   1. Copy to your droplet: scp nginx/vacationpro.conf root@YOUR_IP:/etc/nginx/sites-available/vacationpro
#   2. Enable: ln -s /etc/nginx/sites-available/vacationpro /etc/nginx/sites-enabled/
#   3. Remove default: rm /etc/nginx/sites-enabled/default
#   4. Test: nginx -t
#   5. Reload: systemctl reload nginx
#   6. SSL: certbot --nginx -d vacationpro.co -d www.vacationpro.co

server {
    listen 80;
    server_name vacationpro.co www.vacationpro.co;

    # Redirect www to non-www
    if ($host = www.vacationpro.co) {
        return 301 https://vacationpro.co$request_uri;
    }

    # -----------------------------------------
    # WordPress: /blog, /wp-admin, /wp-content
    # -----------------------------------------
    root /var/www/wordpress;

    location /blog {
        index index.php index.html;
        try_files $uri $uri/ /blog/index.php?$args;
    }

    location /wp-admin {
        index index.php index.html;
        try_files $uri $uri/ /wp-admin/index.php?$args;
    }

    location /wp-login.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-fpm.sock;
    }

    location /wp-json {
        try_files $uri $uri/ /index.php?$args;
    }

    # Serve WordPress static assets (themes, uploads, plugins)
    location /wp-content {
        try_files $uri $uri/ =404;
    }

    location /wp-includes {
        try_files $uri $uri/ =404;
    }

    # Handle PHP for WordPress paths
    location ~ ^/(blog|wp-admin|wp-json)/.*\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # WordPress root PHP files (wp-login.php, wp-cron.php, etc.)
    location ~ ^/wp-.*\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # -----------------------------------------
    # Next.js: Everything else
    # -----------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Block hidden files
    location ~ /\.ht {
        deny all;
    }

    client_max_body_size 64M;
}
