# Nginx config for WordPress on DigitalOcean droplet
# Only serves WordPress — Next.js is hosted on Vercel
#
# Installation:
#   1. Copy to droplet: scp nginx/vacationpro.conf root@YOUR_IP:/etc/nginx/sites-available/vacationpro
#   2. Enable: ln -s /etc/nginx/sites-available/vacationpro /etc/nginx/sites-enabled/
#   3. Remove default: rm /etc/nginx/sites-enabled/default
#   4. Test: nginx -t
#   5. Reload: systemctl reload nginx
#   6. SSL: certbot --nginx -d blog.vacationpro.co

server {
    listen 80;
    server_name blog.vacationpro.co;

    root /var/www/wordpress;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }

    client_max_body_size 64M;
}
